<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PRO İlan Sistemi v4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#eaeaea;
    padding:20px;
}

.app{
    display:flex;
    gap:20px;
}

/* SOL */
.panel-sol{
    width:35%;
    background:#fff;
    padding:15px;
    border-radius:6px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

button{
    padding:8px;
    margin:3px;
    cursor:pointer;
}

/* SAĞ */
.panel-sag{
    display:flex;
    justify-content:center;
}

/* İLAN */
#ilan{
    width:350px;
    min-width:350px;
    max-width:350px;
    background:#fff;
    padding:10px;
    user-select:text;
    margin:auto;
}

.banner img{
    width:100%;
    height:auto;
}

.siyah-baslik{
    background:#000;
    color:#fff;
    text-align:center;
    padding:15px;
    font-weight:bold;
}

.alt-baslik{
    background:#000;
    color:#fff;
    text-align:center;
    padding:10px;
    margin-top:5px;
}

.icerik{
    padding:10px;
    white-space:pre-line;
    text-align:left;
    line-height:1.6;
}

.uyari{
    background:#000;
    color:#94eb63;
    text-align:center;
    padding:15px;
    margin-top:10px;
}

.kayit{
    padding:5px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}
.kayit:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<div class="app">

<!-- SOL PANEL -->
<div class="panel-sol">

<h3>İlan Girişi</h3>

<input id="baslikInput" placeholder="Araç Başlığı" oninput="canli()">

<textarea id="ozellikInput" rows="8" placeholder="Her satıra 1 özellik" oninput="canli()"></textarea>

<textarea id="eksperInput" rows="4" placeholder="Eksper durumu" oninput="canli()"></textarea>

<button onclick="kopyalaIlan()">📋 Kopyala</button>
<button onclick="sahibindenFormat()">📄 Sahibinden</button>
<button onclick="whatsappGonder()">📱 WhatsApp</button>
<button onclick="pdfIndir()">🧾 PDF</button>
<button onclick="kaydet()">💾 Kaydet</button>

<hr>

<h4>Kayıtlı İlanlar</h4>
<div id="liste"></div>

</div>

<!-- SAĞ PANEL -->
<div class="panel-sag">

<div id="ilan">

    <div class="banner">
        <img src="https://www.ciooptik.com/upload//galeri/tru7z-0086/4/GaleriImg///baslik2.gif">
    </div>

    <div class="siyah-baslik" id="baslik"></div>

    <div class="alt-baslik">ARAÇ ÖZELLİKLERİ</div>
    <div class="icerik" id="ozellikler"></div>

    <div id="eksper-blok">
        <div class="alt-baslik">EKSPER DURUMU</div>
        <div class="icerik" id="eksper"></div>
    </div>

    <div class="uyari">
        GAYRİMENKUL TAKASI TEKLİF ETMEYİNİZ !
    </div>

</div>

</div>
</div>

<script>

/* TÜRKÇE BÜYÜK */
function buyukTR(metin){
    return metin.toLocaleUpperCase("tr-TR");
}

/* CANLI */
function canli(){

    document.getElementById("baslik").innerText =
        buyukTR(document.getElementById("baslikInput").value);

    let ozellik = document.getElementById("ozellikInput").value
        .split("\n")
        .map(s => s.trim())
        .filter(Boolean)
        .map(s => "• " + buyukTR(s));

    document.getElementById("ozellikler").innerText =
        ozellik.join("\n");

    let eksperList = document.getElementById("eksperInput").value
        .split("\n")
        .map(s => s.trim())
        .filter(Boolean);

    if(eksperList.length === 0){
        document.getElementById("eksper-blok").style.display="none";
    }else{
        document.getElementById("eksper-blok").style.display="block";
        document.getElementById("eksper").innerText =
            eksperList.map(s=>"• "+buyukTR(s)).join("\n");
    }
}

/* KOPYALA */
function kopyalaIlan(){
    navigator.clipboard.writeText(
        document.getElementById("ilan").innerText
    );
    alert("Kopyalandı!");
}

/* SAHİBİNDEN */
function sahibindenFormat(){

    let baslik = baslikInput.value;
    let ozellik = ozellikler.innerText;
    let eksper = eksper.innerText;

    let metin = `
${baslik}

-----------------------
ARAÇ ÖZELLİKLERİ
-----------------------
${ozellik}

-----------------------
EKSPER DURUMU
-----------------------
${eksper}

NOT: TAKAS YOKTUR.
`;

    navigator.clipboard.writeText(metin);
    alert("Hazır!");
}

/* WHATSAPP */
function whatsappGonder(){
    let metin = document.getElementById("ilan").innerText;
    window.open("https://wa.me/?text="+encodeURIComponent(metin));
}

/* PDF */
function pdfIndir(){

    html2pdf().from(document.getElementById("ilan")).set({
        margin:0.5,
        filename:"ilan.pdf",
        html2canvas:{scale:2}
    }).save();
}

/* KAYDET */
function kaydet(){

    let ilan = {
        id:Date.now(),
        baslik:baslikInput.value,
        ozellik:ozellikInput.value,
        eksper:eksperInput.value
    };

    let liste = JSON.parse(localStorage.getItem("ilanlar")||"[]");
    liste.unshift(ilan);

    localStorage.setItem("ilanlar",JSON.stringify(liste));
    listele();
}

/* LİSTELE */
function listele(){

    let liste = JSON.parse(localStorage.getItem("ilanlar")||"[]");
    let alan = document.getElementById("liste");
    alan.innerHTML="";

    liste.forEach((i,index)=>{
        let d=document.createElement("div");
        d.className="kayit";
        d.innerText=i.baslik;

        d.onclick=()=>yukle(i);

        d.oncontextmenu=e=>{
            e.preventDefault();
            if(confirm("Silinsin mi?")) sil(index);
        };

        alan.appendChild(d);
    });
}

/* YÜKLE */
function yukle(i){
    baslikInput.value=i.baslik;
    ozellikInput.value=i.ozellik;
    eksperInput.value=i.eksper;
    canli();
}

/* SİL */
function sil(i){
    let liste = JSON.parse(localStorage.getItem("ilanlar"));
    liste.splice(i,1);
    localStorage.setItem("ilanlar",JSON.stringify(liste));
    listele();
}

listele();

</script>

</body>
</html>
