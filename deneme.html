<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İlan Oluştur - Burak</title>

<style>
body{
    font-family: Arial;
    background:#eaeaea;
    padding:20px;
}

.app{
    display:flex;
    gap:20px;
}

/* SOL PANEL */
.panel-sol{
    width:35%;
    background:#fff;
    padding:15px;
    border-radius:6px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

/* SAĞ PANEL */
.panel-sag{
    width:65%;
}

/* İLAN */
#ilan{
    background:#fff;
    padding:15px;
    user-select:text;
}

.banner img{
    width:100%;
    pointer-events:none;
}

.siyah-baslik{
    background:#000;
    color:#fff;
    text-align:center;
    padding:15px;
    font-weight:bold;
}

.alt-baslik{
    background:#000;
    color:#fff;
    text-align:center;
    padding:10px;
    margin-top:5px;
}

.icerik{
    padding:10px;
    white-space:pre-line;
    text-align:left;
    line-height:1.6;
}

.uyari{
    background:#000;
    color:#94eb63;
    text-align:center;
    padding:15px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- SOL PANEL -->
<div class="panel-sol">

<h3>İlan Girişi</h3>

<input id="baslikInput" placeholder="Araç Başlığı" oninput="canli()">

<textarea id="ozellikInput" rows="10" placeholder="Her satıra 1 özellik yaz" oninput="canli()"></textarea>

<textarea id="eksperInput" rows="5" placeholder="Eksper durumu" oninput="canli()"></textarea>

</div>

<!-- SAĞ PANEL -->
<div class="panel-sag">

<div id="ilan">

    <div class="banner">
        <img src="https://www.ciooptik.com/upload//galeri/tru7z-0086/4/GaleriImg///baslik2.gif">
    </div>

    <div class="siyah-baslik" id="baslik"></div>

    <div class="alt-baslik">ARAÇ ÖZELLİKLERİ</div>
    <div class="icerik" id="ozellikler"></div>

    <div id="eksper-blok">
        <div class="alt-baslik">EKSPER DURUMU</div>
        <div class="icerik" id="eksper"></div>
    </div>

    <div class="uyari">
        GAYRİMENKUL TAKASI TEKLİF ETMEYİNİZ !
    </div>

</div>

</div>
</div>

<script>

/* TÜRKÇE BÜYÜK HARF */
function buyukTR(metin){
    return metin.toLocaleUpperCase("tr-TR");
}

/* CANLI GÜNCELLEME */
function canli(){

    // BAŞLIK
    document.getElementById("baslik").innerText =
        buyukTR(document.getElementById("baslikInput").value);

    // ÖZELLİKLER (satır satır)
    let ozellik = document.getElementById("ozellikInput").value
        .split("\n")
        .map(s => "• " + buyukTR(s.trim()))
        .filter(s => s !== "• ");

    document.getElementById("ozellikler").innerText =
        ozellik.join("\n");

    // EKSPER
    let eksperList = document.getElementById("eksperInput").value
        .split("\n")
        .map(s => s.trim())
        .filter(Boolean);

    if(eksperList.length === 0){
        document.getElementById("eksper-blok").style.display = "none";
    }else{
        document.getElementById("eksper-blok").style.display = "block";

        document.getElementById("eksper").innerText =
            eksperList.map(s => "• " + buyukTR(s)).join("\n");
    }
}

</script>

</body>
</html>
