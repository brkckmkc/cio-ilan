<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PRO İlan Sistemi v6.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; display: flex; gap: 20px; justify-content: center; }
        .panel-sol { width: 350px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); height: fit-content; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .all-in-one-button { 
            width: 100%; padding: 25px 10px; cursor: pointer; border: none; border-radius: 6px; 
            background: #2980b9; color: white; font-weight: bold; font-size: 17px;
            transition: 0.3s; margin-bottom: 15px;
        }
        .all-in-one-button:active { transform: translateY(3px); box-shadow: 0 2px 0 #1c5982; background: #27ae60; }
        
        .kayit { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        #preview-container { background: #fff; border: 1px solid #ccc; width: 400px; padding: 10px; }

        /* ÖDEME TABLOSU PASTEL TASARIM */
        .odeme-tablosu { width: 100%; border-collapse: separate; border-spacing: 4px; font-family: Arial, sans-serif; margin-top: 15px; }
        
        /* Ana Başlık - Pastel Mavi-Gri */
        .tablo-ana-baslik { background: #d0d7de; color: #333; font-weight: bold; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; border: 0; }
        
        /* Sütun Başlıkları - Hafif Pastel Mavi */
        .tablo-ust-header { background: #e3f2fd; color: #444; font-weight: bold; padding: 8px; border-radius: 8px; text-align: center; font-size: 12px; }
        
        /* Genel Hücre Yapısı */
        .tablo-hucre { border: 1px solid #e0e0e0; padding: 8px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; color: #444; background: #ffffff; }
        
        /* Tek Sayılı Satırlar (1, 3, 5...) - Çok Hafif Pastel Mavi */
        .odeme-tablosu tr:nth-child(odd) .tablo-hucre { background: #f7fbff; }
        
        /* Çift Sayılı Satırlar (2, 4, 6...) - Çok Hafif Pastel Yeşil */
        .odeme-tablosu tr:nth-child(even) .tablo-hucre { background: #f1f8e9; }
        
        /* Başlık satırlarının arka planını ezmemesi için sabitleme */
        .odeme-tablosu tr:first-child .tablo-ana-baslik,
        .odeme-tablosu tr:nth-child(2) .tablo-ust-header { background-color: inherit; }
    </style>
</head>
<body>

<div class="panel-sol">
    <h3>İlan Girişi</h3>
    <input id="baslikInput" placeholder="Araç Başlığı" oninput="canli()">
    <textarea id="ozellikInput" rows="8" placeholder="Özellikler" oninput="canli()"></textarea>
    <textarea id="eksperInput" rows="3" placeholder="Eksper Durumu" oninput="canli()"></textarea>
    
    <button class="all-in-one-button" onclick="superFonksiyon()">KAYDET</button>
    
    <div id="liste" style="margin-top:20px; border-top:1px solid #eee;">
        <h4>Kayıtlı İlanlar</h4>
        <input id="aramaInput" type="text" placeholder="🔍 İlanlarda ara..." onkeyup="listele()" style="width:100%; padding:8px; margin-bottom:10px;">
        <div id="kayitlar-alanı"></div>
    </div>
</div>

<div id="preview-container">
    <div id="ilan-yapisi" style="width:350px; margin:0; padding:0; background:#ffffff; text-align:center; line-height:1;">
        
        <div style="display:block; line-height:0; margin:0; padding:0;">
            <img src="https://www.ciooptik.com/upload//galeri/tru7z-0086/4/GaleriImg///ciobanner.gif" style="width:350px; display:block; margin:0; border:0;">
        </div>

        <div style="font-size:18px; color:#000; font-weight:bold; padding:10px 0; margin:0; line-height:1.2;">
            <span id="baslikText">ARAÇ BAŞLIĞI</span>
        </div>

        <div style="display:block; line-height:0; margin:0; padding:0;">
            <img src="https://www.ciooptik.com/upload/galeri/tru7z-0086/4/GaleriImg//cioaracozellikleri.gif" style="width:350px; display:block; margin:0; border:0;">
        </div>

        <div id="ozelliklerText" style="font-size:14px; color:#333; font-weight:bold; line-height:1.2; padding:10px; margin:0; white-space:pre-wrap;"></div>

        <div id="eksper-blok" style="display:none; margin:0; padding:0;">
            <div style="display:block; line-height:0; margin:0; padding:0;">
                <img src="https://www.ciooptik.com/upload/galeri/tru7z-0086/4/GaleriImg//cioeksperdurumu.gif" style="width:350px; display:block; margin:0; border:0;">
            </div>
            <div id="eksperText" style="font-size:14px; color:#333; font-weight:bold; line-height:1.2; padding:10px; margin:0; white-space:pre-wrap;"></div>
        </div>

        <div style="display:block; line-height:0; margin:0; padding:0;">
            <img src="https://www.ciooptik.com/upload//galeri/tru7z-0086/4/GaleriImg///ciobilgi.gif" style="width:350px; display:block; margin:0; border:0;">
        </div>

        <div style="font-size:12px; color:#000; font-weight:bold; padding:10px 0; margin:0; line-height:1.1;">
            GAYRİMENKUL TAKASI TEKLİF ETMEYİNİZ!
        </div>

        <div style="display:block; line-height:0; margin:0; padding:0;">
            <img src="https://www.ciooptik.com/upload//galeri/tru7z-0086/4/GaleriImg///ciokredikarti.gif" style="width:350px; display:block; margin:0; border:0;">
        </div>
        
        <div style="display:block; line-height:0; margin:0; padding:0;">
            <img src="https://www.ciooptik.com/upload//galeri/tru7z-0086/4/GaleriImg///956485565.png" style="width:350px; display:block; margin:0; border:0;">
        </div>


    </div>
</div>

<script>
const buyukTR = (t) => t.toLocaleUpperCase("tr-TR");

function canli() {
    const b = document.getElementById("baslikInput").value;
    const o = document.getElementById("ozellikInput").value;
    const e = document.getElementById("eksperInput").value;

    document.getElementById("baslikText").innerText = b ? buyukTR(b) : "ARAÇ BAŞLIĞI";
    document.getElementById("ozelliklerText").innerText = buyukTR(o);

    if(e.trim()){
        document.getElementById("eksper-blok").style.display = "block";
        document.getElementById("eksperText").innerText = buyukTR(e);
    } else {
        document.getElementById("eksper-blok").style.display = "none";
    }
}

async function superFonksiyon() {
    const bVal = document.getElementById("baslikInput").value;
    const oVal = document.getElementById("ozellikInput").value;
    const eVal = document.getElementById("eksperInput").value;

    if(!bVal) return alert("Başlık boş olamaz!");

    kaydetSessiz(bVal, oVal, eVal);

    const ilanNode = document.getElementById('ilan-yapisi');
    const range = document.createRange();
    range.selectNode(ilanNode);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');

    html2canvas(ilanNode, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
        let link = document.createElement("a");
        link.download = `${buyukTR(bVal).substring(0,15)}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
        alert("✔ Seçildi & Kopyalandı\n✔ Görsel İndirildi\n✔ Kaydedildi");
    });
}

function kaydetSessiz(b, o, e) {
    let liste = JSON.parse(localStorage.getItem("ilan_pro_v61") || "[]");
    const idx = liste.findIndex(i => i.baslik === b);
    if(idx > -1) liste[idx] = { baslik:b, ozellik:o, eksper:e };
    else liste.unshift({ baslik:b, ozellik:o, eksper:e });
    localStorage.setItem("ilan_pro_v61", JSON.stringify(liste));
    listele();
}

function listele() {
    let liste = JSON.parse(localStorage.getItem("ilan_pro_v61") || "[]");
    let aranan = buyukTR(document.getElementById("aramaInput").value);
    let alan = document.getElementById("kayitlar-alanı");
    alan.innerHTML = "";
    liste.filter(item => buyukTR(item.baslik).includes(aranan)).forEach((i, idx) => {
        let d = document.createElement("div");
        d.className = "kayit";
        d.innerHTML = `<span>${i.baslik}</span><span style="color:red; font-weight:bold;" onclick="sil(${idx}); event.stopPropagation();">✖</span>`;
        d.onclick = () => {
            document.getElementById("baslikInput").value = i.baslik;
            document.getElementById("ozellikInput").value = i.ozellik;
            document.getElementById("eksperInput").value = i.eksper;
            canli();
        };
        alan.appendChild(d);
    });
}

function sil(idx) {
    if(confirm("Silinsin mi?")) {
        let liste = JSON.parse(localStorage.getItem("ilan_pro_v61") || "[]");
        liste.splice(idx, 1);
        localStorage.setItem("ilan_pro_v61", JSON.stringify(liste));
        listele();
    }
}

listele();
canli();
</script>
</body>
</html>
