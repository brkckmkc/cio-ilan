<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İlan Oluştur (Burak Çakmakçı)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#eaeaea;
    padding:20px;
}

.app{
    display:flex;
    gap:20px;
    max-width:1800px;
    width:100%;
    margin:auto;
}

/* SOL PANEL */
.panel-sol{
    width:35%;
    background:#fff;
    padding:20px;
    border-radius:6px;
}

input, textarea, select{
    width:100%;
    padding:8px;
    margin-bottom:8px;
    box-sizing:border-box;
}

button{
    padding:10px 18px;
    margin-right:6px;
    cursor:pointer;
}

/* SAĞ PANEL */
.panel-sag{
    width:65%;
    background:#f5f5f5;
    padding:10px;
    overflow:auto;
}

#ilan-wrapper{
    display:flex;
    justify-content:center;
}

#ilan{
    width:100%;
    margin:auto;
}

/* İLAN */


.banner img{
    width:100%;
    height:auto;
}

.siyah-baslik{
    background:#000;
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:18px;
    font-weight:bold;
    border-bottom:10px solid #fff; /* kalın beyaz çizgi */
}


.alt-baslik{
    background:#000;
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:14px;
    margin-top:1px;
}

.icerik{
    text-align:center;
    padding:10px;
    line-height:2;
    font-size:14px;
}

.uyari{
    background:#000;
    color:#94eb63;
    text-align:center;
    padding:18px;
    font-weight:bold;
}

.kayit{
    padding:6px 8px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}
.kayit:hover{
    background:#f0f0f0;
}


.kategori{
    margin-bottom:14px;
}

.kategori-baslik{
        background:#d1d1d1;

    font-weight:bold;
    margin-bottom:6px;
    text-align:center;
    font-size:18px;
}

.ozellik-item{
    padding:4px 0;
    cursor:grab;
}

.ozellik-item.dragging{
    opacity:0.4;
}


</style>
</head>

<body>

<div class="app">

<!-- SOL -->
<div class="panel-sol">

<h3>İlan Bilgileri</h3>

<input id="baslikInput" placeholder="Araç Başlığı" oninput="canli()">

<textarea id="ozellikInput" rows="10" placeholder="Araç özellikleri" oninput="canli()"></textarea>

<textarea id="eksperInput" rows="5" placeholder="Eksper durumu" oninput="canli()"></textarea>

<button onclick="resmiIndir()">💾 Görseli İndir</button>



<hr>

<h4>Kayıtlı İlanlar</h4>

<input 
    id="aramaInput" 
    placeholder="Başlığa göre ara..." 
    oninput="listele()">

<div id="liste"></div>


</div>

<!-- SAĞ -->
<div class="panel-sag">

<div id="ilan">

    <div class="banner">
        <img src="img/showroom.png" crossorigin="anonymous">
    </div>

    <div class="siyah-baslik" id="baslik"></div>

    <div class="alt-baslik">ARAÇ ÖZELLİKLERİ</div>
    <div class="icerik" id="ozellikler"></div>

    <div id="eksper-blok">
    <div class="alt-baslik">EKSPER DURUMU</div>
    <div class="icerik" id="eksper"></div>
    </div>

    <div class="uyari">GAYRİMENKUL TAKASI TEKLİF ETMEYİNİZ !</div>

    <div class="banner">
        <img src="img/footer.png" crossorigin="anonymous">

    
    </div>

</div>

</div>
</div>

<script>

const KATEGORI_SIRASI = [
    "DIŞ TASARIM & DONANIM",
    "İÇ TASARIM & KONFOR",
    "GÜVENLİK DONANIM",
    "SÜRÜŞ ASİSTAN",
    "TEKNOLOJİ",
    "EKSTRA DONANIM"
];

/* CLOUDINARY */
const CLOUD_NAME = "dhoyvlfcj";
const UPLOAD_PRESET = "cio_upload";
let sonGorsel = "";

/* TÜRKÇE BÜYÜK HARF */
function buyukTR(metin){
    return metin.toLocaleUpperCase("tr-TR");
}

/* ANAHTAR KELİMEYE GÖRE GRUP */
function gruplandir(satir){

    const dis = [
        "PANAROMİK","LED","AYNA","CAM","FAR","JANT","LASTİK","TAVAN","SPOLIER","SUNROOF"
    ];

    const ic = [
        "KOLTUK","KLİMA","AMBİYANS","BAGAJ",
        "KOL DAYAMA","YÜKSEKLİK","DERİ","DÖŞEME","ISITMA","SOĞUTMA","HAFIZALI"
    ];

    const guvenlik = [
        "FREN","GÜVENLİK","ÇARPIŞMA","YAYA","KORUMA","AIRBAG","ABS","ESP"
    ];

    const surus = [
        "ASİST","HIZ","ŞERİT","KÖR","YORGUNLUK",
        "YOKUŞ","START","SABİT","LİMİTÖR",
        "CRUISE","PARK","HOLD","LAUNCH","F1","SÜRÜŞ"
    ];

    const teknoloji = [
        "NAVİGASYON","360","APPLE","CAR PLAY","ANDROID",
        "BLUETOOTH","EKRAN","USB","KABLOSUZ",
        "SES","HARMAN","BOSE","BANG","BURMESTER",
        "TV","CONNECT","ŞARJ"
    ];

    let s = satir;

    if(dis.some(k => s.includes(k))) return "DIŞ TASARIM & DONANIM";
    if(ic.some(k => s.includes(k))) return "İÇ TASARIM & KONFOR";
    if(guvenlik.some(k => s.includes(k))) return "GÜVENLİK DONANIM";
    if(surus.some(k => s.includes(k))) return "SÜRÜŞ ASİSTAN";
    if(teknoloji.some(k => s.includes(k))) return "TEKNOLOJİ";

    return "EKSTRA DONANIM";
}

/* ÖZELLİKLERİ HTML’E BAS */
function ozellikleriBas(metin){

    let gruplar = {};

    metin.split("\n")
        .map(s => buyukTR(s.trim()))
        .filter(Boolean)
        .forEach(s => {
            let g = gruplandir(s);
            if(!gruplar[g]) gruplar[g] = [];
            gruplar[g].push(s);
        });

    let html = "";

    KATEGORI_SIRASI.forEach(grup => {

        if(!gruplar[grup]) return;

        html += `
        <div class="kategori"
             ondragover="event.preventDefault()"
             ondrop="dropKategori('${grup}', event)">
            <div class="kategori-baslik">${grup}</div>
            <div id="kat_${grup}">
        `;

        gruplar[grup].forEach(item => {
            html += `
            <div class="ozellik-item"
                 draggable="true"
                 ondragstart="dragStart(this)"
                 ondragend="dragEnd()">
                ${item}
            </div>
            `;
        });

        html += `</div></div>`;
    });

    return html;
}



/* CANLI */
function canli(){
    baslik.innerText = buyukTR(baslikInput.value);
    ozellikler.innerHTML = ozellikleriBas(ozellikInput.value);
    let eksperMetin = eksperInput.value
        .split("\n")
        .map(s => s.trim())
        .filter(Boolean);

    if(eksperMetin.length === 0){
        document.getElementById("eksper-blok").style.display = "none";
    }else{
        document.getElementById("eksper-blok").style.display = "block";
        eksper.innerHTML = buyukTR(eksperMetin.join("<br>"));
    }
}

/* RESİM YÜKLE + KAYIT */
function resmiIndir(){

    const ilan = document.getElementById("ilan");

    const targetWidth = 600;
    const scale = targetWidth / ilan.offsetWidth;

    html2canvas(ilan,{
        scale: scale * 2,
        useCORS:true,
        backgroundColor:"#fff"
    }).then(canvas=>{

        let link = document.createElement("a");
        link.download = "ilan_" + Date.now() + ".jpg";
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();
    });
}

/* KAYDET */
function kaydet(){

    let ilan = {
        id:Date.now(),
        baslik: buyukTR(baslikInput.value),
        ozellik: buyukTR(ozellikInput.value),
        eksper: buyukTR(eksperInput.value),

    };

    let liste = JSON.parse(localStorage.getItem("cio_ilanlar")||"[]");
    liste.unshift(ilan);
    localStorage.setItem("cio_ilanlar",JSON.stringify(liste));
    listele();
}

/* LİSTE */
function listele(){
    let arama = buyukTR(aramaInput.value || "");
    let liste = JSON.parse(localStorage.getItem("cio_ilanlar")||"[]");
    let alan = document.getElementById("liste");
    alan.innerHTML = "";

    liste
    .filter(i => i.baslik.includes(arama))
    .forEach((i,index)=>{
        let d = document.createElement("div");
        d.className="kayit";
        d.innerText=i.baslik;
        d.onclick=()=>yukle(i);
        d.oncontextmenu=e=>{
            e.preventDefault();
            if(confirm("Silinsin mi?")) sil(index);
        };
        alan.appendChild(d);
    });
}

function sil(i){
    let l = JSON.parse(localStorage.getItem("cio_ilanlar"));
    l.splice(i,1);
    localStorage.setItem("cio_ilanlar",JSON.stringify(l));
    listele();
}

function yukle(i){
    baslikInput.value=i.baslik;
    ozellikInput.value=i.ozellik;
    eksperInput.value=i.eksper;
    canli();
}

listele();

function dragStart(el){
    dragItem = el;
    el.classList.add("dragging");
}

function dragEnd(){
    if(dragItem) dragItem.classList.remove("dragging");
    dragItem = null;
}

function dropKategori(grup, e){
    e.preventDefault();
    const hedef = e.currentTarget.querySelector("div[id^='kat_']");
    if(dragItem && hedef){
        hedef.appendChild(dragItem);
    }
}

</script>

</body>
</html>
